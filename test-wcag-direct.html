<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direct WCAG Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-left: 3px solid #007bff; }
        .error { border-left-color: #dc3545; background: #ffe6e6; }
        .success { border-left-color: #28a745; background: #e6ffe6; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #007bff; color: white; }
    </style>
</head>
<body>
    <h1>Direct WCAG JavaScript Test</h1>
    <div id="logs"></div>
    <div id="tableContainer"></div>

    <script>
        const logs = document.getElementById('logs');
        const tableContainer = document.getElementById('tableContainer');
        
        function log(message, type = 'log') {
            console.log(message);
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = message;
            logs.appendChild(div);
        }

        log('Starting test...', 'log');

        // Global variable
        let wcagGuidelines = [];

        // Simulate the exact flow from wcag.php
        document.addEventListener('DOMContentLoaded', function() {
            log('DOM Content Loaded', 'success');
            fetchWcagGuidelines();
        });

        async function fetchWcagGuidelines() {
            log('fetchWcagGuidelines called', 'log');
            
            try {
                const apiUrl = 'api/get-wcag-guidelines.php';
                log('Fetching from: ' + apiUrl, 'log');
                
                const response = await fetch(apiUrl);
                log('Response status: ' + response.status, response.ok ? 'success' : 'error');
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const result = await response.json();
                log('JSON parsed successfully', 'success');
                log('Success: ' + result.success, 'log');
                log('Count: ' + result.count, 'log');
                log('Data length: ' + (result.data ? result.data.length : 0), 'log');
                
                if (!result.success) {
                    throw new Error(result.error || 'Failed to load guidelines');
                }
                
                wcagGuidelines = result.data;
                log('Guidelines stored in global variable: ' + wcagGuidelines.length, 'success');
                
                // Dispatch event
                log('Dispatching wcagDataLoaded event', 'log');
                window.dispatchEvent(new CustomEvent('wcagDataLoaded'));
                
            } catch (error) {
                log('ERROR: ' + error.message, 'error');
                console.error('Error:', error);
            }
        }

        // Listen for the event
        window.addEventListener('wcagDataLoaded', function() {
            log('wcagDataLoaded event received!', 'success');
            log('wcagGuidelines length: ' + wcagGuidelines.length, 'log');
            
            // Render table
            if (wcagGuidelines.length > 0) {
                log('Rendering table...', 'log');
                
                let html = '<table><thead><tr><th>ID</th><th>Title</th><th>Level</th><th>Principle</th></tr></thead><tbody>';
                
                wcagGuidelines.forEach(g => {
                    html += `<tr>
                        <td>${g.id}</td>
                        <td>${g.title}</td>
                        <td>${g.level}</td>
                        <td>${g.principle}</td>
                    </tr>`;
                });
                
                html += '</tbody></table>';
                tableContainer.innerHTML = html;
                
                log('Table rendered with ' + wcagGuidelines.length + ' rows', 'success');
            } else {
                log('No guidelines to render', 'error');
            }
        });
    </script>
</body>
</html>
