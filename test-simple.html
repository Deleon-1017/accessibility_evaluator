<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple WCAG Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .loading { color: blue; }
        .error { color: red; }
        .success { color: green; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
    <h1>Simple WCAG Guidelines Test</h1>
    
    <div id="status" class="loading">Loading...</div>
    
    <div id="info"></div>
    
    <table id="guidelinesTable" style="display: none;">
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Level</th>
                <th>Principle</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <script>
        console.log('Script started');
        
        // Test 1: Check if fetch works
        fetch('api/get-wcag-guidelines.php')
            .then(response => {
                console.log('Response received:', response);
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                return response.text();
            })
            .then(text => {
                console.log('Raw response (first 200 chars):', text.substring(0, 200));
                
                try {
                    const data = JSON.parse(text);
                    console.log('Parsed JSON:', data);
                    
                    const statusDiv = document.getElementById('status');
                    const infoDiv = document.getElementById('info');
                    const table = document.getElementById('guidelinesTable');
                    const tbody = document.getElementById('tableBody');
                    
                    if (data.success) {
                        statusDiv.className = 'success';
                        statusDiv.textContent = `✓ Successfully loaded ${data.count} guidelines`;
                        
                        infoDiv.innerHTML = `
                            <p><strong>Success:</strong> ${data.success}</p>
                            <p><strong>Count:</strong> ${data.count}</p>
                            <p><strong>Data items:</strong> ${data.data ? data.data.length : 0}</p>
                        `;
                        
                        // Populate table
                        if (data.data && data.data.length > 0) {
                            table.style.display = 'table';
                            
                            data.data.forEach(guideline => {
                                const row = tbody.insertRow();
                                row.insertCell(0).textContent = guideline.id;
                                row.insertCell(1).textContent = guideline.title;
                                row.insertCell(2).textContent = guideline.level;
                                row.insertCell(3).textContent = guideline.principle;
                            });
                            
                            console.log('Table populated with', data.data.length, 'rows');
                        }
                    } else {
                        statusDiv.className = 'error';
                        statusDiv.textContent = '✗ Error: ' + (data.error || 'Unknown error');
                    }
                } catch (e) {
                    console.error('JSON parse error:', e);
                    document.getElementById('status').className = 'error';
                    document.getElementById('status').textContent = '✗ Failed to parse JSON: ' + e.message;
                    document.getElementById('info').innerHTML = '<pre>' + text.substring(0, 500) + '</pre>';
                }
            })
            .catch(error => {
                console.error('Fetch error:', error);
                document.getElementById('status').className = 'error';
                document.getElementById('status').textContent = '✗ Fetch failed: ' + error.message;
            });
    </script>
</body>
</html>
