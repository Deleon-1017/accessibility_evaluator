<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Direct API Test</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-left: 3px solid #007bff; }
        .error { border-left-color: #dc3545; background: #ffe6e6; }
        .success { border-left-color: #28a745; background: #e6ffe6; }
    </style>
</head>
<body>
    <h1>Direct API Fetch Test</h1>
    <div id="logs"></div>

    <script>
        const logs = document.getElementById('logs');
        
        function log(message, type = 'log') {
            console.log(message);
            const div = document.createElement('div');
            div.className = `log ${type}`;
            div.textContent = typeof message === 'object' ? JSON.stringify(message, null, 2) : message;
            logs.appendChild(div);
        }

        log('Starting API test...', 'log');

        async function testAPI() {
            try {
                const apiUrl = 'api/get-wcag-guidelines.php';
                log('Fetching from: ' + apiUrl, 'log');
                log('Full URL: ' + window.location.origin + '/' + apiUrl, 'log');
                
                const response = await fetch(apiUrl);
                log('Response received', 'success');
                log('Status: ' + response.status, 'log');
                log('OK: ' + response.ok, 'log');
                log('Headers: ' + JSON.stringify([...response.headers]), 'log');
                
                const text = await response.text();
                log('Response text length: ' + text.length, 'log');
                log('First 500 chars: ' + text.substring(0, 500), 'log');
                
                const data = JSON.parse(text);
                log('JSON parsed successfully!', 'success');
                log('Success: ' + data.success, 'log');
                log('Count: ' + data.count, 'log');
                log('Data length: ' + (data.data ? data.data.length : 0), 'log');
                
                if (data.data && data.data.length > 0) {
                    log('First guideline: ' + JSON.stringify(data.data[0], null, 2), 'success');
                }
                
            } catch (error) {
                log('ERROR: ' + error.message, 'error');
                log('Error stack: ' + error.stack, 'error');
            }
        }

        testAPI();
    </script>
</body>
</html>
